<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek App Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <button id="darkModeToggle" onclick="toggleDarkMode()" title="Dark Mode">
                <i class="fas fa-moon"></i>
            </button>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu()">Categories <i class="fas fa-chevron-down"></i></button>
                <div id="categoryMenu" class="dropdown-content">
                    <a href="#" onclick="filterByCategory('all')">All Apps</a>
                    <a href="#" onclick="filterByCategory('games')">Games</a>
                    <a href="#" onclick="filterByCategory('screen-reader')">Screen Readers</a>
                    <a href="#" onclick="filterByCategory('tts')">TTS</a>
                </div>
            </div>

            <button class="request-btn" onclick="requestApp()">Request App</button>
        </div>

        <h1>Abhishek App Hub</h1>

        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="Search apps, games, tts..." onkeyup="filterApps()">
                <button id="voiceSearchBtn" onclick="startVoiceSearch()" title="Voice Search">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="appGrid" class="app-grid">
            </div>
    </main>

    <script src="apps.js"></script>
</body>
</html>
