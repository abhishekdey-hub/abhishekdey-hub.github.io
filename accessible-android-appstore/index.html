<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Android AppStore</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <button id="darkModeToggle" onclick="toggleDarkMode()" aria-label="Switch to Dark Mode" title="Toggle Dark/Light Mode">
                <i class="fas fa-moon"></i>
            </button>

            <div class="dropdown">
                <button class="dropbtn" onclick="toggleMenu()" aria-haspopup="true" aria-expanded="false">
                    Categories <i class="fas fa-chevron-down"></i>
                </button>
                <div id="categoryMenu" class="dropdown-content">
                    <a href="#" onclick="filterByCategory('all')">All Apps</a>
                    <a href="#" onclick="filterByCategory('games')">Games</a>
                    <a href="#" onclick="filterByCategory('screen-reader')">Screen Readers</a>
                    <a href="#" onclick="filterByCategory('tts')">TTS</a>
                </div>
            </div>

            <button class="request-btn" onclick="requestApp()" aria-label="Request a new app">Request App</button>
        </div>

        <h1>Accessible Android AppStore</h1>

        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchBar" placeholder="Search apps, games, tts..." onkeyup="filterApps()" aria-label="Search apps">
                <button id="voiceSearchBtn" onclick="startVoiceSearch()" title="Voice Search" aria-label="Start voice search">
                    <i class="fas fa-microphone"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="appGrid" class="app-grid"></div>
    </main>

    <script src="assets/js/apps.js"></script>
</body>
</html>
