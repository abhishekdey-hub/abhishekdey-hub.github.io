<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../../assets/css/style.css">

</head>
<body>

    <header>
        <div class="top-bar">
            <a href="../../index.html" class="request-btn" aria-label="Go back to store">

            </a>

            <button id="darkModeToggle" onclick="toggleDarkMode()" aria-label="Toggle Dark Mode">

                            </div>
